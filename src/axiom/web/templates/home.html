<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Axiom Web Console</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; }
    .container { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
    .topnav { margin-bottom: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
    .navbtn { display: inline-block; background: #1f2937; color: #e2e8f0; padding: 8px 10px; border-radius: 8px; text-decoration: none; font-size: 13px; }
    .navbtn.active { background: #2563eb; color: #ffffff; }
    .title { font-size: 30px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; margin-bottom: 18px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 10px; padding: 14px; }
    .name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .desc { color: #94a3b8; min-height: 38px; margin-bottom: 10px; }
    .link { display: inline-block; background: #1f2937; color: #e2e8f0; padding: 8px 10px; border-radius: 8px; text-decoration: none; }
    .path { margin-top: 8px; color: #64748b; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    {% include "_nav.html" %}
    <div class="title">Axiom Web Console</div>
    <div class="subtitle">Quick access menu for all dashboards and APIs.</div>
    <div class="grid">
      {% for item in menu_links %}
      <div class="card">
        <div class="name">{{ item.name }}</div>
        <div class="desc">{{ item.description }}</div>
        <a class="link" href="{{ item.path }}">Open</a>
        <div class="path">{{ item.path }}</div>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
